name: tricobbler-mcp_tool_search_package_files
description: Get a list of all non-standard files in an R package directory, excluding
  meta directories (Meta/, help/, docs/, R/, html/), and standard files (DESCRIPTION,
  INDEX, WORDLIST). Useful for discovering package resources like data files, examples,
  and additional assets. To read a package file, use `tricobbler-mcp_tool_read_package_file`
  tool.
parameters:
  type: object
  properties:
    package_name:
      type: string
      description: The exact name of the package to list files from (e.g., "tricobbler",
        "dplyr", "ggplot2"). This parameter is required.
      examples:
      - tricobbler
      - dplyr
      - ggplot2
  required:
  - package_name
category: discovery
returns:
  type: object
  properties:
    error:
      type: string
      description: Character, error message if success is FALSE
    files:
      type: array
      description: Character vector, relative paths to files in the package (excluding
        Meta/, help/, docs/, R/, html/, DESCRIPTION, INDEX, WORDLIST). The paths are
        always relative to the package root
      items:
        type: string
    package:
      type: string
      description: Character, the package name that was queried
    success:
      type: object
      description: Logical, whether file list was retrieved successfully
