workflows:
- name: default
  description: Skill to get weather based on city name
  version: 0.1.0
  stages:
    triage:
    - name: gather_information
      description: Collect system information such as timezone, IP address
      agent_id: gather_agent
      resources:
        tools: []
        skills: []
      accessibility: all
      parameters: []
      max_retry: 0
      priority: 100
      critical: no
      final: no
      on_failure: .na.character
      append_errors_to_chat: no
      clear_chat_on_pass: no
      depends_on: []
    executing:
    - name: get_weather
      description: |-
        You are a weather assistant.
        You will be given an user prompt and system information.
        Please infer the location from the user_prompt based on the system information.
        Use the skill_weather tool to fetch the weather.
        First call action='readme' to learn the tool,
        then call action='script' with cli_kwargs to run
        curl_weather.R with the user's requested location.
        Summarize the result in a friendly report.

        Do infer location information from user_prompt.
        Users might make typos, automatically correct the typo.

        Do NOT use system information if the user asks for a specific location
        (such as heading to a location, plan to go).
        ONLY use the city from system_info if you cannot find any city from the user's prompt.
      agent_id: weather_agent
      resources:
        skills: tricobbler::weather
      accessibility: explicit
      parameters:
        keep_turns: yes
      max_retry: 0
      priority: 100
      critical: no
      final: no
      on_failure: .na.character
      append_errors_to_chat: no
      clear_chat_on_pass: no
      depends_on:
        geo_information:
          state: gather_information
          field: result
          stage: triage
  parameters:
    user_prompt: How's the weather today?
agents:
- type: chat
  provider: anthropic
  id: weather_agent
  echo: "${ config$ollama$echo %||% 'output' }"
- id: gather_agent
  type: script
  description: ''
  source: tricobbler-agents/get_sysinfo.R
  function_name: get_sysinfo

